<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Rochus Bar" />
  <title>Rochus · Bar</title>
  <meta name="theme-color" content="#0a0908" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍻</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:ital,wght@0,500;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="bar.css" />
</head>
<body>
  <div class="login" id="login-view">
    <div class="login__card">
      <p class="login__brand">ROCHUS</p>
      <h1 class="login__title">Staff</h1>
      <p class="login__sub">Voer de PIN in om bestellingen te zien</p>
      <form class="login__form" id="login-form">
        <input
          type="password"
          inputmode="numeric"
          pattern="[0-9]*"
          autocomplete="current-password"
          class="login__pin"
          id="login-pin"
          placeholder="PIN"
          maxlength="12"
          required
        />
        <button type="submit" class="login__btn">Open dashboard</button>
        <p class="login__error" id="login-error" hidden></p>
      </form>
    </div>
  </div>

  <div class="dash" id="dash-view" hidden>
    <header class="dash__header">
      <div class="dash__id">
        <h1 class="dash__brand">ROCHUS <span class="dash__brand-sub">bar</span></h1>
        <p class="dash__live" id="live-status">
          <span class="dash__live-dot" aria-hidden="true"></span>
          <span id="live-status-text">Verbinden…</span>
        </p>
        <p class="dash__stats" id="dash-stats" hidden></p>
      </div>
      <div class="dash__actions">
        <label class="dash__toggle" title="Geluid bij nieuwe tickets én elke minuut zolang er open bestellingen zijn">
          <input type="checkbox" id="sound-toggle" checked />
          <span class="dash__switch" aria-hidden="true"></span>
          <span class="dash__toggle-text">🔔 Geluid</span>
        </label>
        <button type="button" class="dash__link" id="wake-toggle" hidden>💡 Scherm aan</button>
        <button type="button" class="dash__link" id="stock-toggle-btn" aria-expanded="false" aria-controls="stock-panel">
          📦 Voorraad
        </button>
        <a class="dash__link" href="/print">🖨️ Menukaart</a>
        <a class="dash__link" href="/qr">🔳 QR</a>
        <button type="button" class="dash__logout" id="logout-btn">Uitloggen</button>
      </div>
    </header>

    <section class="stock" id="stock-panel" hidden>
      <div class="stock__header">
        <div>
          <h2 class="stock__title">Voorraad</h2>
          <p class="stock__sub">Zet producten op uitverkocht — gasten zien ze dan niet meer als bestelbaar</p>
        </div>
        <p class="stock__count" id="stock-count"></p>
      </div>
      <div class="stock__list" id="stock-list"></div>
    </section>

    <div class="dash__flash" id="new-flash" hidden>Nieuwe bestelling</div>

    <main class="board" id="order-board">
      <div class="board__empty" id="board-empty">
        <span class="board__empty-icon" aria-hidden="true">🍸</span>
        <p class="board__empty-title">Geen open bestellingen</p>
        <p class="board__empty-sub">Alles geserveerd. Poets een glas, geniet even.</p>
      </div>
    </main>
  </div>

  <div class="bar-toast" id="bar-toast" hidden>
    <span id="bar-toast-text"></span>
    <button type="button" class="bar-toast__undo" id="bar-toast-undo" hidden>Ongedaan maken</button>
  </div>

  <script src="bar.js" defer></script>
</body>
</html>
